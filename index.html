<!DOCTYPE html>
<html lang="es">
<head>

</head>
<body>

    <div class="layout">
        <aside>
            <div class="app-title">

                fill="currentColor" width="800px" height="800px" viewBox="0 0 32 32" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;" version="1.1" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:serif="http://www.serif.com/" xmlns:xlink="http://www.w3.org/1999/xlink">

                </g>
                </svg>
                <h1 class="app-name">Sayonara</h1>
            </div>
            
            <nav class="navigation-bar">
                <button class="navigation-button" data-section="inicio">
                    <svg class="navigation-icon" 
                    width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M21.4498 10.275L11.9998 3.1875L2.5498 10.275L2.9998 11.625H3.7498V20.25H20.2498V11.625H20.9998L21.4498 10.275ZM5.2498 18.75V10.125L11.9998 5.0625L18.7498 10.125V18.75H14.9999V14.3333L14.2499 13.5833H9.74988L8.99988 14.3333V18.75H5.2498ZM10.4999 18.75H13.4999V15.0833H10.4999V18.75Z" 
                    fill="currentColor"/>
                    </svg>
                    Inicio
                </button>
                <button class="navigation-button" data-section="playlists">
                    <svg class="navigation-icon"
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        >
                        <path d="M16 6l4 14" />
                        <path d="M12 6v14" />
                        <path d="M8 8v12" />
                        <path d="M4 4v16" />
                    </svg>
                    Playlists
                </button>
                <button class="navigation-button" data-section="favoritos">
                    <svg class="navigation-icon" 
                    width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M12 6.00019C10.2006 3.90317 7.19377 3.2551 4.93923 5.17534C2.68468 7.09558 2.36727 10.3061 4.13778 12.5772C5.60984 14.4654 10.0648 18.4479 11.5249 19.7369C11.6882 19.8811 11.7699 19.9532 11.8652 19.9815C11.9483 20.0062 12.0393 20.0062 12.1225 19.9815C12.2178 19.9532 12.2994 19.8811 12.4628 19.7369C13.9229 18.4479 18.3778 14.4654 19.8499 12.5772C21.6204 10.3061 21.3417 7.07538 19.0484 5.17534C16.7551 3.2753 13.7994 3.90317 12 6.00019Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Favoritos
                </button>
                <button class="navigation-button" data-section="guardados">
                    <svg class="navigation-icon" width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="24" height="24" fill="transparent"/>
                    <path d="M12 6V18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M6 12H18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Guardados
                </button>
            </nav>
        </aside>

        <main>

            <section id="inicio">

                <div class="song-card">

                    <img class="album-portrait" src="assets/default.jpeg" alt="Portada del album">
                    <input type="file" accept="audio/*" style="display: none;"> 
                    <audio id="audio"></audio>
                    <div class="song-description">
                        <h2 id="song-name">Sin reproducir</h2>
                        <p id="artist-name">Artista desconocido</p>
                    </div>
                    <div class="track-bar">
                        <p id="start-time">0:00</p>
                        <input type="range" value="0" min="0" max="100">
                        <p id="end-time">0:00</p>
                    </div>
                    
                    <div class="buttons-bar">
                        <button class="btn-back"><img src="assets/back.png" alt="Hacia atras"></button>
                        <button class="btn-playpause"><img id="icon-playpause" src="assets/play.png" alt="Reproducir/Pausar"></button>
                        <button class="btn-next"><img src="assets/next.png" alt="Hacia delante"></button>
                    </div>

                </div>

            </section>

            <section id="playlists">

            </section>
            
            <section id="favoritos">

                <div class="favoritos-header">

                    <div class="favoritos-title">
                        <h1>Tus Favoritos</h1>
                    </div>

                    <p>Tus canciones preferidas, todo en un solo lugar.</p>

                </div>

                <div class="favorite-list">

                </div>

            </section>

            <section id="guardados">

                <div class="guardados-header">

                    <div class="guardados-title">
                        <h1>Canciones Guardadas</h1>
                        <button class="btn-base" id="btn-add">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus" aria-hidden="true"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
                            Añadir Canción
                        </button>
                    </div>

                    <p>Aquí puedes gestionar todas las canciones que has guardado en tu biblioteca.</p>

                </div>

                <div class="song-list">

                </div>

            </section>

        </main>
        
        <footer class="section-footer">
            <img src="" alt="Album cover">
            <div class="footer-description">
                <h1 id="footer-song-name">Sin titulo</h1>
                <p id="footer-artist-name">Sin artista</p>
            </div>
            <div class="footer-controls">
                <div class="footer-controls">
                    <button class="footer-btn-back">
                        <img src="assets/back.png" alt="Anterior">
                    </button>
                    <button class="footer-btn-playpause">
                        <img id="footer-icon-playpause" src="assets/play.png" alt="Reproducir/Pausar">
                    </button>
                    <button class="footer-btn-next">
                        <img src="assets/next.png" alt="Siguiente">
                    </button>
                </div>
            </div>
        </footer>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script src="scripts/app.js"></script>

</body>
</html>
